version: '3.8'

networks:
  webenablix-network:
    driver: bridge

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: webenablix_db
    restart: unless-stopped
    networks:
      - webenablix-network
    environment:
      POSTGRES_DB: webenablix
      POSTGRES_USER: webenablix_user
      POSTGRES_PASSWORD: webenablix_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webenablix_user -d webenablix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webenablix_backend
    restart: unless-stopped
    networks:
      - webenablix-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8001
      DATABASE_URL: postgresql://webenablix_user:Supabase%23123@postgres:5432/webenablix?sslmode=disable
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webenablix
      DB_USER: webenablix_user
      DB_PASSWORD: Supabase#123
      JWT_SECRET: ?m23Kc8$#.pat}/Y0KJPjSptM*kA]upgTRd7j-mH3b%b5]rg(5nGddu?#yp{ePnw
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin@webenablix
      GOOGLE_CLIENT_ID: 545358341358-okj8erfv2mcab403k17q21tbusen5cm1.apps.googleusercontent.com
      FRONTEND_URL: https://ahmadsaeed.me
      PAGESPEED_API_KEY: ""
    ports:
      - "8001:8001"

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ""        # Empty = nginx proxy to backend container
        VITE_GOOGLE_CLIENT_ID: 545358341358-okj8erfv2mcab403k17q21tbusen5cm1.apps.googleusercontent.com
    container_name: webenablix_frontend
    restart: unless-stopped
    networks:
      - webenablix-network
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
