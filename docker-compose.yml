version: '3.8'

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: webenablix_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: webenablix
      POSTGRES_USER: webenablix_user
      POSTGRES_PASSWORD: webenablix_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webenablix_user -d webenablix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webenablix_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8001
      DATABASE_URL: postgresql://webenablix_user:webenablix_pass@postgres:5432/webenablix
      JWT_SECRET: change_this_in_production_to_a_long_random_string
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin@webenablix
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8001:8001"

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ""        # Empty = nginx proxy to backend container
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: webenablix_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
