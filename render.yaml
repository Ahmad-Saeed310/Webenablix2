services:
  # ── Backend (Node.js / Express) ─────────────────────────────────────────────
  - type: web
    name: webenablix-backend
    env: node
    region: oregon
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: node db/migrate.js && node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # DATABASE_URL — paste your Supabase / Render Postgres connection string
      - key: DATABASE_URL
        sync: false
      # JWT secret — click "Generate" in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      # Admin credentials — override in Render dashboard Environment tab
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false  # Set a strong password in the Render dashboard
      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      # CORS — primary frontend domain
      - key: FRONTEND_URL
        value: https://ahmadsaeed.me
